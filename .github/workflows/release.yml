name: "Reusable Android CD (Release)"

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string

      java_version:
        required: true
        type: string

      build_variant:
        required: true
        type: string

      coverage_threshold:
        required: true
        type: string

      runner:
        required: false
        type: string
        default: ubuntu-latest

      deploy_to_playstore:
        required: false
        type: boolean
        default: false

      playstore_track:
        required: false
        type: string
        default: internal

      playstore_status:
        required: false
        type: string
        default: completed

      package_name:
        required: false
        type: string
        default: ""

      deploy_to_esper:
        required: false
        type: boolean
        default: false

      esper_org_id:
        required: false
        type: string
        default: ""

      esper_app_id:
        required: false
        type: string
        default: ""

      enable_whats_new:
        required: false
        type: boolean
        default: false

      whats_new_file:
        required: false
        type: string
        default: ""

    secrets:
      ANDROID_KEYSTORE:
        required: false
      KEYSTORE_PASSWORD:
        required: false
      KEY_PASSWORD:
        required: false
      KEY_ALIAS:
        required: false

      PLAYSTORE_SERVICE_ACCOUNT:
        required: false

      ESPER_API_KEY:
        required: false

    outputs:
      coverage_percent:
        description: "Computed JaCoCo LINE coverage percent from CI"
        value: ${{ jobs.ci.outputs.coverage_percent }}

permissions:
  contents: write

concurrency:
  group: android-cd-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:

  ci:
    name: Android CI (Reusable)
    uses: ./.github/workflows/push.yml
    with:
      java_version: ${{ inputs.java_version }}
      build_variant: ${{ inputs.build_variant }}
      coverage_threshold: ${{ inputs.coverage_threshold }}

  create_release:
    name: Create GitHub Release
    needs: ci
    runs-on: ${{ inputs.runner }}

    outputs:
      version: ${{ steps.version_check.outputs.version }}
      tag: ${{ steps.version_check.outputs.tag }}

    steps:

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download unsigned Android artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-build-outputs-${{ inputs.build_variant }}
          path: release/android/unsigned

      - name: Determine next GitHub version
        id: version_check
        run: |
          set -euo pipefail

          BASE_VERSION="${{ inputs.version }}"
          git fetch --tags

          if ! [[ "$BASE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "inputs.version must be semver like 1.2.3"
            exit 1
          fi

          CURRENT_VERSION="$BASE_VERSION"

          while git rev-parse "v$CURRENT_VERSION" >/dev/null 2>&1; do
            IFS='.' read -r major minor patch <<<"$CURRENT_VERSION"
            patch=$((patch + 1))
            CURRENT_VERSION="$major.$minor.$patch"
          done

          echo "version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$CURRENT_VERSION" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version_check.outputs.tag }}
          name: Release ${{ steps.version_check.outputs.tag }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sign_android:
    name: Sign Android
    if: ${{ inputs.deploy_to_playstore || inputs.deploy_to_esper }}
    needs: create_release
    runs-on: ${{ inputs.runner }}

    steps:

      - name: Download unsigned Android artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-build-outputs-${{ inputs.build_variant }}
          path: release/android/unsigned

      - name: Install Android SDK tools
        uses: android-actions/setup-android@v3

      - name: Install Build Tools
        run: |
          sdkmanager "build-tools;34.0.0" "platform-tools"
          echo "$ANDROID_SDK_ROOT/build-tools/34.0.0" >> $GITHUB_PATH

      - name: Decode Keystore
        run: |
          mkdir -p /tmp/android
          printf "%s" "${{ secrets.ANDROID_KEYSTORE }}" | base64 --decode > /tmp/android/upload-keystore.jks

      - name: Sign APK
        run: |
          mkdir -p release/android/signed

          APKS=$(find release/android/unsigned -name "*.apk" || true)

          for APK in $APKS; do
            BASENAME=$(basename "$APK" .apk)
            OUT="release/android/signed/${BASENAME}-signed.apk"

            zipalign -f 4 "$APK" /tmp/aligned.apk

            apksigner sign \
              --ks /tmp/android/upload-keystore.jks \
              --ks-key-alias "${{ secrets.KEY_ALIAS }}" \
              --ks-pass pass:"${{ secrets.KEYSTORE_PASSWORD }}" \
              --key-pass pass:"${{ secrets.KEY_PASSWORD }}" \
              --out "$OUT" \
              /tmp/aligned.apk
          done

      - name: Sign AAB
        run: |
          AABS=$(find release/android/unsigned -name "*.aab" || true)

          for AAB in $AABS; do
            BASENAME=$(basename "$AAB" .aab)
            OUT="release/android/signed/${BASENAME}-signed.aab"

            cp "$AAB" "$OUT"

            jarsigner \
              -keystore /tmp/android/upload-keystore.jks \
              -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
              -keypass "${{ secrets.KEY_PASSWORD }}" \
              "$OUT" \
              "${{ secrets.KEY_ALIAS }}"
          done

      - name: Upload signed artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-signed
          path: release/android/signed/*

  deploy_playstore:
    name: Deploy to Play Store
    if: ${{ inputs.deploy_to_playstore }}
    needs: sign_android
    runs-on: ${{ inputs.runner }}

    steps:

      - uses: actions/checkout@v4

      - name: Download signed artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-signed
          path: release/android/signed

      - name: Prepare What's New (Optional)
        if: ${{ inputs.enable_whats_new && inputs.whats_new_file != '' }}
        run: |
          LANG="en-US"
          mkdir -p "$RUNNER_TEMP/whatsnew/${LANG}"

          if [ -f "${{ inputs.whats_new_file }}" ]; then
            cp "${{ inputs.whats_new_file }}" "$RUNNER_TEMP/whatsnew/${LANG}/whatsnew"
            echo "WhatsNew prepared."
          else
            echo "WhatsNew file not found. Skipping."
          fi

      - name: Upload to Play Store
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAYSTORE_SERVICE_ACCOUNT }}
          packageName: ${{ inputs.package_name }}
          releaseFiles: release/android/signed/*.aab
          track: ${{ inputs.playstore_track }}
          status: ${{ inputs.playstore_status }}
          inAppUpdatePriority: 2
          whatsNewDirectory: ${{ inputs.enable_whats_new && inputs.whats_new_file != '' && format('{0}/whatsnew', runner.temp) || '' }}

  deploy_esper:
    name: Deploy to Esper
    if: ${{ inputs.deploy_to_esper }}
    needs: sign_android
    runs-on: ${{ inputs.runner }}

    steps:

      - name: Download signed artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-signed
          path: release/android/signed

      - name: Upload to Esper
        env:
          ESPER_API_KEY: ${{ secrets.ESPER_API_KEY }}
          ESPER_ORG_ID: ${{ inputs.esper_org_id }}
          ESPER_APP_ID: ${{ inputs.esper_app_id }}
        run: |
          APK=$(find release/android/signed -name "*.apk" | head -n 1)

          curl -X POST "https://api.esper.io/v0/enterprise/${ESPER_ORG_ID}/apps/${ESPER_APP_ID}/versions/" \
            -H "Authorization: Bearer ${ESPER_API_KEY}" \
            -F "apk=@${APK}" \
            -F "releaseNotes=Release ${{ needs.create_release.outputs.tag }}"

  upload_to_release:
    name: Upload artifacts to GitHub Release
    if: ${{ inputs.deploy_to_playstore || inputs.deploy_to_esper }}
    needs: [create_release, sign_android]
    runs-on: ${{ inputs.runner }}

    steps:

      - uses: actions/checkout@v4

      - name: Download signed artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-signed
          path: dist

      - name: Upload assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.create_release.outputs.tag }}"
          FILES=$(find dist -name "*.apk" -o -name "*.aab")

          gh release upload "$TAG" $FILES --clobber